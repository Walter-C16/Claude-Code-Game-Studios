#       - docs/architecture/adr-0003-combat-system.md
#     added: 2026-03-26
#     revised: ""


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: mutable_state_storage
    status: active
    api: "Dictionary-based state with typed getter/setter wrappers on GameStore autoload"
    not: "Resource subclasses per domain (revisit if state exceeds ~100 fields)"
    adr: docs/architecture/adr-0001-gamestore-state.md
    reason: "Simpler JSON round-tripping. Resource subclasses add translation layer without reducing serialization code."
    referenced_by:
      - docs/architecture/adr-0001-gamestore-state.md
    added: 2026-04-09
    revised: ""

  - purpose: save_file_write
    status: active
    api: "FileAccess.open(temp) + store_string() + DirAccess.rename(temp, target)"
    not: "Direct FileAccess.open(target) overwrite (not atomic, corruption risk on mobile)"
    adr: docs/architecture/adr-0002-save-system.md
    reason: "Atomic write prevents half-written saves on app crash. store_string() returns bool since 4.4."
    referenced_by:
      - docs/architecture/adr-0002-save-system.md
      - docs/architecture/adr-0001-gamestore-state.md
    added: 2026-04-09
    revised: ""

  - purpose: enemy_data_storage
    status: active
    api: "JSON file (res://assets/data/enemies.json) loaded into Dictionary autoload at boot"
    not: "Resource (.tres) files per enemy; inline hardcoded dictionaries"
    adr: docs/architecture/adr-0016-enemy-registry.md
    reason: "Consistent with project JSON data convention (dialogue, story flow). Flat read-only data doesn't benefit from Resource subclasses."
    referenced_by:
      - docs/architecture/adr-0016-enemy-registry.md
    added: 2026-04-09
    revised: ""

# Example:
#
# api_decisions:
#   - purpose: physics_raycast
#     status: active
#     api: PhysicsServer3D.space_get_direct_state()
#     not: RayCast3D node     # explicitly banned for this purpose
#     adr: docs/architecture/adr-0002-physics-architecture.md
#     reason: "Direct server calls avoid per-frame node overhead; 3× faster in profiling"
