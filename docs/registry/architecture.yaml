#     revised: ""


# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: direct_cross_system_state_write
    status: active
    description: "No system may write to mutable game state directly. All mutations go through GameStore's typed setter methods."
    why: "Centralized state ownership prevents desync, ensures continuous persistence, and makes save/load atomic."
    adr: docs/architecture/adr-0001-gamestore-state.md
    added: 2026-04-09

  - pattern: direct_cross_layer_signal_connection
    status: active
    description: "Systems must not directly connect to signals on systems in other layers. All cross-layer signal communication routes through EventBus."
    why: "Direct connections create hidden imports between layers, break layer isolation, and make systems untestable in isolation."
    adr: docs/architecture/adr-0004-eventbus.md
    added: 2026-04-09

  - pattern: raw_scene_tree_change
    status: active
    description: "No code outside scene_manager.gd may call SceneTree.change_scene_to_file(). All scene transitions route through SceneManager.change_scene(SceneId)."
    why: "Centralized routing prevents double-tap race conditions, ensures consistent transitions, and provides context payload passing."
    adr: docs/architecture/adr-0003-scene-management.md
    added: 2026-04-09

  - pattern: parallel_mutable_state
    status: active
    description: "No system may maintain its own persistent mutable state outside GameStore. Scene-local ephemeral state (e.g., combat encounter) is allowed."
    why: "Parallel state creates save/load inconsistency and desync between systems."
    adr: docs/architecture/adr-0001-gamestore-state.md
    added: 2026-04-09

